    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-hover: #2c2c2e;
            --separator: #38383a;
            --label: #ffffff;
            --secondary-label: #8e8e93;
            --tertiary-label: #636366;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--label);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════ HERO SECTION ═══════════ */
        .hero {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            height: 420px;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* Fade-to-black gradient overlay */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, #000000 0%, #000000 10%, rgba(0,0,0,0.85) 35%, rgba(0,0,0,0.4) 65%, transparent 100%);
            pointer-events: none;
        }

        /* Name & subtitle overlaid on hero */
        .hero-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            text-align: center;
            padding: 0 20px 24px;
        }

        .hero-name {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        .hero-subtitle {
            font-size: 15px;
            color: var(--secondary-label);
            font-weight: 400;
        }

        /* ═══════════ CONTAINER ═══════════ */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 20px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ═══════════ SOCIAL ICON ROW ═══════════ */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 24px 0 32px;
        }

        .social-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--separator);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--label);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-icon:active {
            background: var(--surface-hover);
        }

        @media (hover: hover) {
            .social-icon:hover {
                background: var(--surface);
                border-color: var(--secondary-label);
                transform: translateY(-3px) scale(1.1);
                box-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
            }
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ═══════════ SECTION LABEL ═══════════ */
        .section-label {
            width: 100%;
            font-size: 13px;
            font-weight: 500;
            color: var(--secondary-label);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 0 4px;
            margin-bottom: 8px;
        }

        /* ═══════════ GROUPED LIST (iOS) ═══════════ */
        .list-group {
            width: 100%;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 28px;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 16px;
            text-decoration: none;
            color: var(--label);
            transition: all 0.3s ease;
            position: relative;
        }

        .list-item:active {
            background: var(--surface-hover);
        }

        @media (hover: hover) {
            .list-item:hover {
                background: var(--surface-hover);
                transform: translateX(6px);
            }
            .list-item:hover .icon {
                transform: scale(1.15) rotate(-3deg);
            }
        }

        .list-item + .list-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 54px;
            right: 0;
            height: 0.5px;
            background: var(--separator);
        }

        .list-item .icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .list-item .icon svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .icon.instagram { background: #e1306c; }
        .icon.github { background: #6e5494; }
        .icon.linkedin { background: #0a66c2; }
        .icon.tiktok { background: #010101; border: 0.5px solid var(--separator); }

        .icon.whatsapp { background: #25d366; }
        .icon.gmail { background: #ea4335; }

        .list-item .text {
            flex: 1;
            min-width: 0;
        }

        .list-item .title {
            font-size: 16px;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        .list-item .subtitle {
            font-size: 13px;
            color: var(--secondary-label);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item .chevron {
            flex-shrink: 0;
            color: var(--tertiary-label);
        }

        .list-item .chevron svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ═══════════ FOOTER ═══════════ */
        .footer {
            text-align: center;
            padding-top: 12px;
        }

        .footer p {
            font-size: 12px;
            color: var(--tertiary-label);
        }

        /* ═══════════ ANIMATIONS ═══════════ */
        .hero {
            animation: fadeIn 0.8s ease;
        }

        .hero-image {
            animation: subtleZoom 20s ease-in-out infinite alternate;
        }

        .hero-name {
            animation: fadeUp 0.6s ease 0.3s backwards;
        }

        .hero-subtitle {
            animation: fadeUp 0.6s ease 0.45s backwards;
        }

        .social-row {
            animation: fadeUp 0.5s ease 0.5s backwards;
        }

        .social-icon {
            animation: popIn 0.4s ease backwards;
        }
        .social-icon:nth-child(1) { animation-delay: 0.55s; }
        .social-icon:nth-child(2) { animation-delay: 0.65s; }
        .social-icon:nth-child(3) { animation-delay: 0.75s; }
        .social-icon:nth-child(4) { animation-delay: 0.85s; }
        .social-icon:nth-child(5) { animation-delay: 0.95s; }

        .section-label {
            animation: fadeUp 0.5s ease 1s backwards;
        }

        .list-group {
            animation: fadeUp 0.5s ease 1.05s backwards;
        }

        .list-item {
            animation: slideIn 0.4s ease backwards;
        }
        .list-item:nth-child(1) { animation-delay: 1.1s; }
        .list-item:nth-child(2) { animation-delay: 1.2s; }
        .list-item:nth-child(3) { animation-delay: 1.3s; }
        .list-item:nth-child(4) { animation-delay: 1.4s; }

        .footer {
            animation: fadeUp 0.5s ease 1.5s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes subtleZoom {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* Ambient glow behind container */
        .container::before {
            content: '';
            position: fixed;
            top: 30%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            transform: translateX(-50%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: glowPulse 6s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            from { opacity: 0.4; transform: translateX(-50%) scale(1); }
            to { opacity: 0.8; transform: translateX(-50%) scale(1.3); }
        }

        @media (max-width: 480px) {
            .hero { height: 380px; }
            .hero-name { font-size: 26px; }
        }
    </style>
</head>
